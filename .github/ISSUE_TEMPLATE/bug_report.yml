name: Bug Report
description: Report a bug in Anatomia CLI
labels: ["bug"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node Version
      description: "Output of `node --version`"
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI Version
      description: "Output of `ana --version`"
      placeholder: "anatomia-cli/1.0.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Minimal steps to reproduce the issue"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: scan-output
    attributes:
      label: Scan Output
      description: "If relevant, paste the output of `ana scan .`"
    validations:
      required: false
