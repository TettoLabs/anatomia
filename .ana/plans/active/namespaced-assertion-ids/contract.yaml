version: "1.0"
sealed_by: "AnaPlan"
feature: "Namespaced Assertion IDs"

assertions:
  - id: NAI-A001
    says: "Plan template instructs prefixed assertion IDs with the slug-derived rule"
    block: "plan template has prefix rule"
    target: "template.ana-plan.id-field"
    matcher: "contains"
    value: "first letter of each word"

  - id: NAI-A002
    says: "Plan template contract example shows prefixed IDs"
    block: "plan template has prefixed example"
    target: "template.ana-plan.contract-example"
    matcher: "contains"
    value: "HGCC-A001"

  - id: NAI-A003
    says: "Plan template includes collision avoidance instruction"
    block: "plan template has collision check"
    target: "template.ana-plan.collision-section"
    matcher: "contains"
    value: "collision"

  - id: NAI-A004
    says: "Build template tag example uses prefixed format"
    block: "build template has prefixed tags"
    target: "template.ana-build.tag-example"
    matcher: "contains"
    value: "HGCC-A001"

  - id: NAI-A005
    says: "Build template multi-tag example uses prefixed format"
    block: "build template has prefixed multi-tags"
    target: "template.ana-build.multi-tag-rule"
    matcher: "contains"
    value: "HGCC-A001, HGCC-A002"

  - id: NAI-A006
    says: "Verify template pre-check output shows prefixed IDs"
    block: "verify template has prefixed output"
    target: "template.ana-verify.precheck-example"
    matcher: "contains"
    value: "HGCC-A001"

  - id: NAI-A007
    says: "Pre-check regex allows hyphens in the tag scan pattern"
    block: "regex includes hyphen in character class"
    target: "verify.ts.line163.regex"
    matcher: "contains"
    value: "\\w,\\s-"

  - id: NAI-A008
    says: "Both pre-check regex locations are fixed"
    block: "both regex locations fixed"
    target: "verify.ts.line200.regex"
    matcher: "contains"
    value: "\\w,\\s-"

  - id: NAI-A009
    says: "Pre-check correctly matches a single prefixed assertion ID"
    block: "matches prefixed ID"
    target: "precheck.assertion.status"
    matcher: "equals"
    value: "COVERED"

  - id: NAI-A010
    says: "Pre-check correctly matches comma-separated prefixed IDs"
    block: "matches comma-separated prefixed IDs"
    target: "precheck.assertions.allCovered"
    matcher: "truthy"

  - id: NAI-A011
    says: "Pre-check does not match unprefixed tags against prefixed contract IDs"
    block: "rejects unprefixed tag for prefixed contract"
    target: "precheck.assertion.status"
    matcher: "equals"
    value: "UNCOVERED"

  - id: NAI-A012
    says: "Dogfood plan agent matches template plan agent in changed sections"
    block: "dogfood plan sync"
    target: "dogfood.ana-plan.diff"
    matcher: "equals"
    value: 0

  - id: NAI-A013
    says: "Dogfood build agent matches template build agent in changed sections"
    block: "dogfood build sync"
    target: "dogfood.ana-build.diff"
    matcher: "equals"
    value: 0

  - id: NAI-A014
    says: "Dogfood verify agent matches template verify agent in changed sections"
    block: "dogfood verify sync"
    target: "dogfood.ana-verify.diff"
    matcher: "equals"
    value: 0

  - id: NAI-A015
    says: "Existing pre-check tests still pass with the regex change"
    block: "existing tests pass"
    target: "test.regression.status"
    matcher: "equals"
    value: "pass"

file_changes:
  - path: "packages/cli/templates/.claude/agents/ana-plan.md"
    action: modify
  - path: "packages/cli/templates/.claude/agents/ana-build.md"
    action: modify
  - path: "packages/cli/templates/.claude/agents/ana-verify.md"
    action: modify
  - path: ".claude/agents/ana-plan.md"
    action: modify
  - path: ".claude/agents/ana-build.md"
    action: modify
  - path: ".claude/agents/ana-verify.md"
    action: modify
  - path: "packages/cli/src/commands/verify.ts"
    action: modify
  - path: "packages/cli/tests/commands/verify.test.ts"
    action: modify
