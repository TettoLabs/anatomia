version: "1.0"
sealed_by: "AnaPlan"
feature: "ana proof {slug} command"

assertions:
  # Core functionality
  - id: A001
    says: "Running ana proof with a valid slug displays the feature name"
    block: "displays proof card for valid slug"
    target: "stdout"
    matcher: "contains"
    value: "Stripe Payment Integration"

  - id: A002
    says: "The proof card shows the verification result prominently"
    block: "displays proof card for valid slug"
    target: "stdout"
    matcher: "contains"
    value: "Result: PASS"

  - id: A003
    says: "The proof card shows contract compliance summary"
    block: "displays contract summary"
    target: "stdout"
    matcher: "contains"
    value: "satisfied"

  - id: A004
    says: "The proof card shows deviation count in summary"
    block: "displays contract summary"
    target: "stdout"
    matcher: "contains"
    value: "deviated"

  # Assertions section
  - id: A005
    says: "Satisfied assertions show a checkmark icon"
    block: "displays assertions with status icons"
    target: "stdout"
    matcher: "contains"
    value: "✓"

  - id: A006
    says: "Deviated assertions show a warning icon"
    block: "displays assertions with status icons"
    target: "stdout"
    matcher: "contains"
    value: "⚠"

  - id: A007
    says: "Assertions display the says text from the contract"
    block: "displays assertions with status icons"
    target: "stdout"
    matcher: "contains"
    value: "Creating a payment returns"

  # Timing section
  - id: A008
    says: "The timing section shows total pipeline time"
    block: "displays timing breakdown"
    target: "stdout"
    matcher: "contains"
    value: "Total"

  - id: A009
    says: "The timing section shows per-phase breakdown when available"
    block: "displays timing breakdown"
    target: "stdout"
    matcher: "contains"
    value: "Build"

  # Deviations section
  - id: A010
    says: "Deviations section appears when deviations exist"
    block: "displays deviations when present"
    target: "stdout"
    matcher: "contains"
    value: "Deviations"

  - id: A011
    says: "Each deviation shows what was done instead"
    block: "displays deviations when present"
    target: "stdout"
    matcher: "contains"
    value: "→"

  - id: A012
    says: "Deviations section is omitted when no deviations exist"
    block: "omits deviations section when none"
    target: "stdout"
    matcher: "not_equals"
    value: "Deviations"

  # JSON output
  - id: A013
    says: "The --json flag outputs valid JSON"
    block: "outputs JSON with --json flag"
    target: "parseResult"
    matcher: "truthy"

  - id: A014
    says: "JSON output includes the slug field"
    block: "outputs JSON with --json flag"
    target: "json.slug"
    matcher: "exists"

  - id: A015
    says: "JSON output includes the assertions array"
    block: "outputs JSON with --json flag"
    target: "json.assertions"
    matcher: "exists"

  - id: A016
    says: "JSON output includes timing information"
    block: "outputs JSON with --json flag"
    target: "json.timing"
    matcher: "exists"

  # Error handling
  - id: A017
    says: "Unknown slug returns a helpful error message"
    block: "shows helpful error for unknown slug"
    target: "stderr"
    matcher: "contains"
    value: "No proof found"

  - id: A018
    says: "Unknown slug error suggests checking work status"
    block: "shows helpful error for unknown slug"
    target: "output"
    matcher: "contains"
    value: "ana work status"

  - id: A019
    says: "Missing proof_chain.json returns a helpful error"
    block: "shows helpful error for missing file"
    target: "stderr"
    matcher: "contains"
    value: "No proof chain found"

  - id: A020
    says: "Missing file error suggests using work complete"
    block: "shows helpful error for missing file"
    target: "output"
    matcher: "contains"
    value: "ana work complete"

  # Terminal styling
  - id: A021
    says: "Output uses box-drawing characters for the header"
    block: "uses box-drawing terminal styling"
    target: "stdout"
    matcher: "contains"
    value: "┌"

  - id: A022
    says: "Section headers have horizontal rule separators"
    block: "uses box-drawing terminal styling"
    target: "stdout"
    matcher: "contains"
    value: "────"

  # Edge cases
  - id: A023
    says: "Command works when timing breakdown fields are missing"
    block: "handles missing optional timing fields"
    target: "exitCode"
    matcher: "equals"
    value: 0

  - id: A024
    says: "Command exits with non-zero code on error"
    block: "shows helpful error for unknown slug"
    target: "exitCode"
    matcher: "not_equals"
    value: 0

file_changes:
  - path: "packages/cli/src/commands/proof.ts"
    action: create
  - path: "packages/cli/src/index.ts"
    action: modify
  - path: "packages/cli/tests/commands/proof.test.ts"
    action: create
