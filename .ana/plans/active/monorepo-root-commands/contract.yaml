version: "1.0"
sealed_by: "AnaPlan"
feature: "Monorepo Root Commands"

assertions:
  # AC1: Monorepo produces buildRoot/testRoot
  - id: A001
    says: "Monorepo init produces a root build command alongside the scoped build command"
    block: "monorepo init populates buildRoot"
    target: "anaJson.commands.buildRoot"
    matcher: "exists"

  - id: A002
    says: "Monorepo init produces a root test command alongside the scoped test command"
    block: "monorepo init populates testRoot"
    target: "anaJson.commands.testRoot"
    matcher: "exists"

  - id: A003
    says: "Root build command is the unscoped root-level command, not the primary-package-scoped one"
    block: "monorepo init populates buildRoot"
    target: "anaJson.commands.buildRoot"
    matcher: "not_contains"
    value: "(cd "

  - id: A004
    says: "Root test command is the unscoped root-level command"
    block: "monorepo init populates testRoot"
    target: "anaJson.commands.testRoot"
    matcher: "not_contains"
    value: "(cd "

  # AC2: Single-package projects unaffected
  - id: A005
    says: "Single-package projects do not get root command fields"
    block: "single-repo has no buildRoot or testRoot"
    target: "anaJson.commands.buildRoot"
    matcher: "not_equals"
    value: "string"

  - id: A006
    says: "Single-package projects produce the same commands as before"
    block: "single-repo has no buildRoot or testRoot"
    target: "anaJson.commands.build"
    matcher: "exists"

  # AC3: Worktree fallback chain
  - id: A007
    says: "The worktree build uses the root command when one exists"
    block: "runBuildCommand prefers buildRoot over build"
    target: "buildCommand"
    matcher: "equals"
    value: "buildRoot value"

  - id: A008
    says: "The worktree build falls back to the scoped command when no root command exists"
    block: "runBuildCommand falls back to build when buildRoot is absent"
    target: "buildCommand"
    matcher: "equals"
    value: "build value"

  - id: A009
    says: "The worktree returns null when no build command is configured at all"
    block: "runBuildCommand returns null when neither command exists"
    target: "result"
    matcher: "equals"
    value: null

  # getBuildCommandString consistency
  - id: A010
    says: "The build status display shows the root command when one exists"
    block: "getBuildCommandString prefers buildRoot over build"
    target: "displayCommand"
    matcher: "equals"
    value: "buildRoot value"

  - id: A011
    says: "The build status display falls back to the scoped command when no root command exists"
    block: "getBuildCommandString falls back to build when buildRoot is absent"
    target: "displayCommand"
    matcher: "equals"
    value: "build value"

  # AC4: Re-init preservation
  - id: A012
    says: "Existing ana.json files without root commands survive re-init unchanged"
    block: "preserveUserState handles missing buildRoot/testRoot"
    target: "reInitResult"
    matcher: "truthy"

  - id: A013
    says: "Accidentally blanked root commands get restored to detected values on re-init"
    block: "preserveUserState sanitizes blank buildRoot/testRoot"
    target: "sanitizedCommands.buildRoot"
    matcher: "not_equals"
    value: ""

  # Edge cases
  - id: A014
    says: "Monorepo without root build script does not produce a buildRoot field"
    block: "monorepo with no root build script omits buildRoot"
    target: "anaJson.commands.buildRoot"
    matcher: "not_equals"
    value: "string"

  - id: A015
    says: "Monorepo without root test script does not produce a testRoot field"
    block: "monorepo with no root test script omits testRoot"
    target: "anaJson.commands.testRoot"
    matcher: "not_equals"
    value: "string"

  # Schema passthrough
  - id: A016
    says: "The schema preserves buildRoot and testRoot through parse without data loss"
    block: "AnaJsonSchema passthrough preserves buildRoot/testRoot"
    target: "parsed.commands.buildRoot"
    matcher: "exists"

file_changes:
  - path: "packages/cli/src/commands/init/state.ts"
    action: modify
  - path: "packages/cli/src/utils/worktree.ts"
    action: modify
  - path: "packages/cli/templates/.claude/agents/ana-build.md"
    action: modify
  - path: "packages/cli/templates/.claude/agents/ana-verify.md"
    action: modify
  - path: ".claude/agents/ana-build.md"
    action: modify
  - path: ".claude/agents/ana-verify.md"
    action: modify
  - path: "packages/cli/tests/commands/init/monorepoCommandScoping.test.ts"
    action: modify
  - path: "packages/cli/tests/utils/worktree.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/init/anaJsonSchema.test.ts"
    action: modify
