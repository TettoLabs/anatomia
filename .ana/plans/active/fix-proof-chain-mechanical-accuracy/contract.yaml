version: "1.0"
sealed_by: "AnaPlan"
feature: "Fix Proof Chain Mechanical Accuracy"

assertions:
  # AC1: Monorepo partial path not wrongly closed
  - id: A001
    says: "A finding referencing a file by partial monorepo path is not closed when the file exists elsewhere in the project"
    block: "does not close findings with partial monorepo paths"
    target: "finding.status"
    matcher: "not_equals"
    value: "closed"

  - id: A002
    says: "A partial monorepo path finding stays active after staleness checks"
    block: "does not close findings with partial monorepo paths"
    target: "finding.status"
    matcher: "equals"
    value: "active"

  # AC2: Genuinely deleted basename closed
  - id: A003
    says: "A finding referencing a genuinely deleted file is closed by the mechanical layer"
    block: "closes findings for genuinely deleted basenames"
    target: "finding.status"
    matcher: "equals"
    value: "closed"

  - id: A004
    says: "Deleted file closures record the reason as file removed"
    block: "closes findings for genuinely deleted basenames"
    target: "finding.closed_reason"
    matcher: "equals"
    value: "file removed"

  # AC3: Ambiguous basename not closed
  - id: A005
    says: "A finding with an ambiguous basename matching many files is not closed"
    block: "does not close findings with ambiguous basenames"
    target: "finding.status"
    matcher: "not_equals"
    value: "closed"

  # AC4: Upstream exemption
  - id: A006
    says: "Upstream findings are never subject to staleness checks"
    block: "exempts upstream findings from staleness"
    target: "finding.status"
    matcher: "equals"
    value: "lesson"

  - id: A007
    says: "An upstream finding with a missing file stays as a lesson"
    block: "exempts upstream findings from staleness"
    target: "finding.closed_reason"
    matcher: "not_equals"
    value: "file removed"

  # AC5: Supersession removed
  - id: A008
    says: "Older findings on the same file are not superseded by newer ones"
    block: "does not supersede findings on same file+category"
    target: "olderFinding.status"
    matcher: "not_equals"
    value: "closed"

  - id: A009
    says: "Both old and new findings on the same file stay active"
    block: "does not supersede findings on same file+category"
    target: "newerFinding.status"
    matcher: "equals"
    value: "active"

  # AC6: Reopen wrongly-closed findings
  - id: A010
    says: "Previously superseded findings are reopened"
    block: "reopens wrongly-closed superseded findings"
    target: "finding.status"
    matcher: "equals"
    value: "active"

  - id: A011
    says: "Reopened findings have their closure metadata cleared"
    block: "reopens wrongly-closed superseded findings"
    target: "finding.closed_reason"
    matcher: "not_equals"
    value: "superseded by new-C1"

  - id: A012
    says: "Wrongly-closed upstream findings are reopened as lessons"
    block: "reopens wrongly-closed upstream findings"
    target: "finding.status"
    matcher: "equals"
    value: "lesson"

  # AC7: resolveFindingPaths semantic gate
  - id: A013
    says: "Files that exist at their declared path are skipped during resolution"
    block: "skips resolution for files that exist at declared path"
    target: "item.file"
    matcher: "equals"
    value: "src/utils/proofSummary.ts"

  - id: A014
    says: "Files with slashes that do not exist at declared path enter resolution"
    block: "resolves files with slashes that do not exist at declared path"
    target: "item.file"
    matcher: "contains"
    value: "/"

  - id: A015
    says: "Bare basenames still enter the resolution chain"
    block: "resolves single-match basename to full path"
    target: "item.file"
    matcher: "equals"
    value: "packages/cli/src/engine/census.ts"

  # AC8: Anchor-absent only on verified files
  - id: A016
    says: "Anchor checks run on files verified to exist and close when anchor is absent"
    block: "closes findings whose anchor is absent from file"
    target: "finding.closed_reason"
    matcher: "equals"
    value: "code changed, anchor absent"

  - id: A017
    says: "Anchor checks do not run on files that do not exist at the declared path"
    block: "skips anchor check when file does not exist at declared path"
    target: "finding.closed_reason"
    matcher: "not_equals"
    value: "code changed, anchor absent"

  # AC9 + AC10 + AC11: Template changes
  - id: A018
    says: "The verify template uses repo-relative paths in its example"
    block: "template path example is repo-relative"
    target: "templateContent"
    matcher: "contains"
    value: "packages/cli/src/utils/helper.ts"

  - id: A019
    says: "The verify template includes guidance to reference existing findings"
    block: "template includes duplicate finding guidance"
    target: "templateContent"
    matcher: "contains"
    value: "existing"

  - id: A020
    says: "The template and dogfood copies are identical"
    block: "template and dogfood copies match"
    target: "diff"
    matcher: "equals"
    value: ""

file_changes:
  - path: "packages/cli/src/utils/proofSummary.ts"
    action: modify
  - path: "packages/cli/src/commands/work.ts"
    action: modify
  - path: "packages/cli/tests/utils/proofSummary.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/work.test.ts"
    action: modify
  - path: "packages/cli/templates/.claude/agents/ana-verify.md"
    action: modify
  - path: ".claude/agents/ana-verify.md"
    action: modify
