version: "1.0"
sealed_by: "AnaPlan"
feature: "Close the Loop"

assertions:
  # --- Close: Success Path ---
  - id: A001
    says: "Closing a finding marks it as closed with the developer's reason"
    block: "closes finding successfully"
    target: "finding.status"
    matcher: "equals"
    value: "closed"

  - id: A002
    says: "Closed findings record who closed them and why"
    block: "closes finding successfully"
    target: "finding.closed_by"
    matcher: "equals"
    value: "human"

  - id: A003
    says: "Closed findings record the reason provided"
    block: "closes finding successfully"
    target: "finding.closed_reason"
    matcher: "exists"

  - id: A004
    says: "Closing a finding commits the change to git with a traceable message"
    block: "closes finding successfully"
    target: "commit_message"
    matcher: "contains"
    value: "[proof] Close"

  - id: A005
    says: "Closing regenerates the proof chain dashboard"
    block: "closes finding successfully"
    target: "proof_chain_md_updated"
    matcher: "truthy"

  # --- Close: Error Handling ---
  - id: A006
    says: "Closing from the wrong branch is rejected with a clear error"
    block: "rejects close from wrong branch"
    target: "error.code"
    matcher: "equals"
    value: "WRONG_BRANCH"

  - id: A007
    says: "Closing a nonexistent finding tells the developer it doesn't exist"
    block: "rejects nonexistent finding"
    target: "error.code"
    matcher: "equals"
    value: "FINDING_NOT_FOUND"

  - id: A008
    says: "Closing an already-closed finding shows who closed it and when"
    block: "rejects already-closed finding"
    target: "error.code"
    matcher: "equals"
    value: "ALREADY_CLOSED"

  - id: A009
    says: "Closing without a reason is rejected because closures need explanations"
    block: "rejects close without reason"
    target: "error.code"
    matcher: "equals"
    value: "REASON_REQUIRED"

  - id: A010
    says: "Closing a lesson shows the transition from lesson to closed"
    block: "closes lesson finding"
    target: "output"
    matcher: "contains"
    value: "lesson"

  # --- Close: JSON Output ---
  - id: A011
    says: "Close JSON response includes the full finding object"
    block: "close returns valid JSON envelope"
    target: "response.results.finding.id"
    matcher: "exists"

  - id: A012
    says: "Close JSON response includes the status transition"
    block: "close returns valid JSON envelope"
    target: "response.results.previous_status"
    matcher: "exists"

  - id: A013
    says: "Close JSON response includes chain health metadata"
    block: "close returns valid JSON envelope"
    target: "response.meta.findings.active"
    matcher: "exists"

  # --- Audit: Display ---
  - id: A014
    says: "Audit shows active findings grouped by file"
    block: "displays audit grouped by file"
    target: "output"
    matcher: "contains"
    value: "findings)"

  - id: A015
    says: "Audit caps display at 8 files maximum"
    block: "truncates audit at 8 files"
    target: "displayed_file_count"
    matcher: "equals"
    value: 8

  - id: A016
    says: "Audit caps display at 3 findings per file"
    block: "truncates findings per file at 3"
    target: "displayed_findings_per_file"
    matcher: "equals"
    value: 3

  - id: A017
    says: "Audit shows overflow count when findings exceed display caps"
    block: "shows overflow message"
    target: "output"
    matcher: "contains"
    value: "more"

  - id: A018
    says: "Audit works from any branch without requiring artifact branch"
    block: "audit works from non-artifact branch"
    target: "exit_code"
    matcher: "equals"
    value: 0

  - id: A019
    says: "Audit on a clean chain tells the developer there are no active findings"
    block: "audit with zero findings shows clean message"
    target: "output"
    matcher: "contains"
    value: "clean"

  # --- Audit: JSON ---
  - id: A020
    says: "Audit JSON includes total active count and per-file breakdown"
    block: "audit returns valid JSON envelope"
    target: "response.results.total_active"
    matcher: "exists"

  - id: A021
    says: "Audit JSON includes anchor presence check for each finding"
    block: "audit returns valid JSON envelope"
    target: "response.results.by_file[0].findings[0].anchor_present"
    matcher: "exists"

  # --- JSON Contract ---
  - id: A022
    says: "All proof JSON responses use the permanent four-key envelope"
    block: "existing commands use contract envelope"
    target: "response.command"
    matcher: "exists"

  - id: A023
    says: "All proof JSON responses include chain health in metadata"
    block: "existing commands use contract envelope"
    target: "response.meta.chain_runs"
    matcher: "exists"

  - id: A024
    says: "JSON error responses include the error code and chain metadata"
    block: "error responses use contract envelope"
    target: "response.error.code"
    matcher: "exists"

  - id: A025
    says: "JSON error responses still include metadata even on failure"
    block: "error responses use contract envelope"
    target: "response.meta"
    matcher: "exists"

  # --- Build Delivery ---
  - id: A026
    says: "The Plan template delivers proof context to Build as a structural subsection"
    block: "template includes proof context subsection"
    target: "template_content"
    matcher: "contains"
    value: "### Proof Context"

  # --- Work Complete Hardening ---
  - id: A027
    says: "Work complete warns when pull fails for non-conflict reasons"
    block: "work complete warns on pull failure"
    target: "output"
    matcher: "contains"
    value: "Warning"

  - id: A028
    says: "Work complete nudges the developer to audit when findings pile up"
    block: "work complete shows audit nudge"
    target: "output"
    matcher: "contains"
    value: "ana proof audit"

  - id: A029
    says: "The audit nudge disappears after the first manual finding closure"
    block: "nudge disappears after human close"
    target: "output"
    matcher: "not_contains"
    value: "ana proof audit"

file_changes:
  - path: "packages/cli/src/utils/proofSummary.ts"
    action: modify
  - path: "packages/cli/src/commands/proof.ts"
    action: modify
  - path: "packages/cli/src/commands/work.ts"
    action: modify
  - path: "packages/cli/templates/.claude/agents/ana-plan.md"
    action: modify
  - path: ".claude/agents/ana-plan.md"
    action: modify
  - path: "packages/cli/tests/commands/proof.test.ts"
    action: modify
  - path: "packages/cli/tests/commands/work.test.ts"
    action: modify
